server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Proxy: /api/* é repassado pro backend (evita CORS — navegador só fala com o admin)
  location /api/ {
    proxy_pass https://apps-sharp-ai-backend.jyo3rb.easypanel.host/api/;
    proxy_set_header Host apps-sharp-ai-backend.jyo3rb.easypanel.host;
    proxy_ssl_server_name on;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # SPA fallback — todas as outras rotas caem no index.html
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Cache de assets estáticos
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
}
