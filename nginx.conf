server {
  listen 80;
  server_name _;

  # App servido sob /admin (base path do Vite = /admin/).
  # O Traefik do EasyPanel encaminha /admin/* para este container mantendo o prefixo.
  location /admin/ {
    alias /usr/share/nginx/html/;
    try_files $uri $uri/ /admin/index.html;
  }

  # Redireciona /admin -> /admin/ (sem barra final)
  location = /admin {
    return 301 /admin/;
  }

  # Cache de assets estáticos
  location /admin/assets/ {
    alias /usr/share/nginx/html/assets/;
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  location / {
    return 404;
  }
}
