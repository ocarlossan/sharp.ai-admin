<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SharpAi · Admin</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'%3E%3Crect width='40' height='40' rx='9' fill='%230B6E4F'/%3E%3Cpolyline points='12,23 20,15 28,23' fill='none' stroke='%23fff' stroke-width='3.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3Cpolyline points='12,30 20,22 28,30' fill='none' stroke='%23fff' stroke-width='3.5' stroke-linecap='round' stroke-linejoin='round' opacity='0.6'/%3E%3C/svg%3E" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0B0F14; color: #E6EAF0; }
      #root { min-height: 100vh; }

      /* ── Mobile: compacta os dados ── */
      @media (max-width: 767px) {
        /* grids fixos (1fr 1fr, repeat(3,1fr), 1.4fr 1fr...) viram uma coluna só */
        [style*="grid-template-columns"] { grid-template-columns: 1fr !important; }
        /* tabelas/blocos largos rolam horizontalmente em vez de estourar */
        [style*="overflow-x"] { -webkit-overflow-scrolling: touch; }
        /* nada estoura a largura da tela */
        * { max-width: 100%; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
